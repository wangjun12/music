<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旋律音乐播放器</title>
  <!-- 引入图标库 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* 播放器主容器 */
    .music-player {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 25px;
      padding: 35px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* 歌曲封面 */
    .album-cover {
      text-align: center;
      margin-bottom: 25px;
    }

    .album-cover img {
      width: 100px;
      height: 100px;
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      transition: transform 0.4s ease;
    }

    .album-cover img.playing {
      animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* 歌曲信息 */
    .song-info {
      text-align: center;
      margin-bottom: 25px;
      color: #fff;
    }

    .song-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .song-artist {
      font-size: 16px;
      color: #a8b2d3;
    }

    /* 进度条 */
    .progress-container {
      margin-bottom: 25px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #f72585);
      border-radius: 3px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .time {
      display: flex;
      justify-content: space-between;
      color: #a8b2d3;
      font-size: 13px;
      margin-top: 8px;
    }

    /* 控制按钮 */
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 25px;
    }

    .control-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 18px;
    }

    .control-btn:hover {
      background: linear-gradient(90deg, #e94560, #f72585);
      transform: scale(1.1);
    }

    .play-btn {
      width: 65px;
      height: 65px;
      font-size: 24px;
      background: linear-gradient(90deg, #e94560, #f72585);
    }

    /* 音量控制 */
    .volume-container {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 25px;
      padding: 0 10px;
    }

    .volume-btn {
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .volume-btn:hover {
      color: #f72585;
    }

    .volume-bar {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .volume-progress {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #f72585);
      border-radius: 3px;
      width: 70%;
      transition: width 0.1s linear;
    }

    /* 播放列表 */
    .playlist-container {
      max-height: 220px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .playlist-container::-webkit-scrollbar {
      width: 5px;
    }

    .playlist-container::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 5px;
    }

    .playlist-title {
      color: #fff;
      font-size: 18px;
      margin-bottom: 15px;
      padding-left: 5px;
    }

    .playlist-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 8px;
    }

    .playlist-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .playlist-item.active {
      background: rgba(233, 69, 96, 0.2);
      border-left: 3px solid #e94560;
    }

    .item-img {
      width: 45px;
      height: 45px;
      border-radius: 8px;
      object-fit: cover;
    }

    .item-info {
      flex: 1;
    }

    .item-title {
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 3px;
    }

    .item-artist {
      color: #a8b2d3;
      font-size: 12px;
    }

    /* 响应式适配 */
    @media (max-width: 400px) {
      .music-player {
        padding: 25px 20px;
      }

      .album-cover img {
        width: 240px;
        height: 240px;
      }

      .controls {
        gap: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="music-player">
    <!-- 歌曲封面 -->
    <div class="album-cover">
      <img id="albumImg" src="https://picsum.photos/seed/song1/300/300" alt="歌曲封面">
    </div>

    <!-- 歌曲信息 -->
    <div class="song-info">
      <h2 class="song-title" id="songTitle">夏日晚风</h2>
      <p class="song-artist" id="songArtist">未知歌手</p>
    </div>

    <!-- 进度条 -->
    <div class="progress-container">
      <div class="progress-bar" id="progressBar">
        <div class="progress" id="progress"></div>
      </div>
      <div class="time">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
      </div>
    </div>

    <!-- 控制按钮 -->
    <div class="controls">
      <button class="control-btn" id="prevBtn">
        <i class="fas fa-step-backward"></i>
      </button>
      <button class="control-btn play-btn" id="playBtn">
        <i class="fas fa-play"></i>
      </button>
      <button class="control-btn" id="nextBtn">
        <i class="fas fa-step-forward"></i>
      </button>
    </div>

    <!-- 音量控制 -->
    <div class="volume-container">
      <i class="fas fa-volume-up volume-btn" id="volumeBtn"></i>
      <div class="volume-bar" id="volumeBar">
        <div class="volume-progress" id="volumeProgress"></div>
      </div>
    </div>

    <!-- 播放列表 -->
    <div class="playlist-container">
      <h3 class="playlist-title">播放列表</h3>
      <div id="playlist">
        <!-- 列表项由JS自动生成 -->
      </div>
    </div>
  </div>

  <script src="./songs.js"></script>
  <script>
    // 歌曲数据（可自行替换）
    


    // 获取DOM元素
    const albumImg = document.getElementById('albumImg');
    const songTitle = document.getElementById('songTitle');
    const songArtist = document.getElementById('songArtist');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressBar = document.getElementById('progressBar');
    const progress = document.getElementById('progress');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    const volumeBar = document.getElementById('volumeBar');
    const volumeProgress = document.getElementById('volumeProgress');
    const volumeBtn = document.getElementById('volumeBtn');
    const playlist = document.getElementById('playlist');

    // 初始化音频
    const audio = new Audio();
    let currentSongIndex = 0;
    let isPlaying = false;
    let isMuted = false;

    // 加载播放列表
    function loadPlaylist() {
      playlist.innerHTML = '';
      songs.forEach((song, index) => {
        const item = document.createElement('div');
        item.className = `playlist-item ${index === currentSongIndex ? 'active' : ''}`;
        item.innerHTML = `
                    <img src="${song.cover}" alt="${song.title}" class="item-img">
                    <div class="item-info">
                        <div class="item-title">${song.title}</div>
                        <div class="item-artist">${song.artist}</div>
                    </div>
                `;
        item.addEventListener('click', () => {
          currentSongIndex = index;
          loadSong();
          playSong();
        });
        playlist.appendChild(item);
      });
    }

    // 加载当前歌曲
    function loadSong() {
      const song = songs[currentSongIndex];
      audio.src = song.url;
      albumImg.src = song.cover;
      songTitle.textContent = song.title;
      songArtist.textContent = song.artist;

      // 重置播放状态
      progress.style.width = '0%';
      playBtn.innerHTML = '<i class="fas fa-play"></i>';
      albumImg.classList.remove('playing');
      isPlaying = false;

      // 更新列表高亮
      loadPlaylist();
    }

    // 播放歌曲
    function playSong() {
      audio.play();
      isPlaying = true;
      playBtn.innerHTML = '<i class="fas fa-pause"></i>';
      albumImg.classList.add('playing');
    }

    // 暂停歌曲
    function pauseSong() {
      audio.pause();
      isPlaying = false;
      playBtn.innerHTML = '<i class="fas fa-play"></i>';
      albumImg.classList.remove('playing');
    }

    // 上一曲
    function prevSong() {
      currentSongIndex--;
      if (currentSongIndex < 0) {
        currentSongIndex = songs.length - 1;
      }
      loadSong();
      playSong();
    }

    // 下一曲
    function nextSong() {
      currentSongIndex++;
      if (currentSongIndex >= songs.length) {
        currentSongIndex = 0;
      }
      loadSong();
      playSong();
    }

    // 格式化时间
    function formatTime(seconds) {
      const minutes = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${minutes}:${secs < 10 ? '0' : ''}${secs}`;
    }

    // 更新进度条
    function updateProgress(e) {
      if (isPlaying) {
        const { duration, currentTime } = e.srcElement;
        const progressPercent = (currentTime / duration) * 100;
        progress.style.width = `${progressPercent}%`;
        currentTimeEl.textContent = formatTime(currentTime);
      }
    }

    // 设置进度条
    function setProgress(e) {
      const width = this.clientWidth;
      const clickX = e.offsetX;
      const duration = audio.duration;
      audio.currentTime = (clickX / width) * duration;
    }

    // 设置音量
    function setVolume(e) {
      const width = this.clientWidth;
      const clickX = e.offsetX;
      const volume = clickX / width;
      audio.volume = volume;
      volumeProgress.style.width = `${volume * 100}%`;

      // 更新音量图标
      if (volume === 0) {
        volumeBtn.className = 'fas fa-volume-mute volume-btn';
      } else if (volume < 0.5) {
        volumeBtn.className = 'fas fa-volume-down volume-btn';
      } else {
        volumeBtn.className = 'fas fa-volume-up volume-btn';
      }
    }

    // 静音切换
    function toggleMute() {
      isMuted = !isMuted;
      if (isMuted) {
        audio.volume = 0;
        volumeProgress.style.width = '0%';
        volumeBtn.className = 'fas fa-volume-mute volume-btn';
      } else {
        audio.volume = 0.7;
        volumeProgress.style.width = '70%';
        volumeBtn.className = 'fas fa-volume-up volume-btn';
      }
    }

    // 事件监听
    playBtn.addEventListener('click', () => {
      isPlaying ? pauseSong() : playSong();
    });

    prevBtn.addEventListener('click', prevSong);
    nextBtn.addEventListener('click', nextSong);
    audio.addEventListener('timeupdate', updateProgress);
    progressBar.addEventListener('click', setProgress);
    volumeBar.addEventListener('click', setVolume);
    volumeBtn.addEventListener('click', toggleMute);
    audio.addEventListener('ended', nextSong);

    // 初始化
    window.addEventListener('load', () => {
      loadSong();
      loadPlaylist();
      audio.volume = 0.7;
      volumeProgress.style.width = '70%';
    });
  </script>
</body>

</html>
